<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Jusort - 专业简历制作</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        /* 基础设置 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .canvas-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        
        /* 网格背景 */
        #main-canvas {
            background-image: 
                linear-gradient(45deg, #f8fafc 25%, transparent 25%), 
                linear-gradient(-45deg, #f8fafc 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #f8fafc 75%), 
                linear-gradient(-45deg, transparent 75%, #f8fafc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .canvas-element { cursor: move; user-select: none; transition: transform 0.1s; }
        .canvas-element:hover { outline: 2px solid #3b82f6; }
        .canvas-element.active { outline: 2px solid #2563eb; outline-offset: 4px; }

        /* --- 新增动画 CSS --- */
        
        /* 1. 向上淡入关键帧 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 2. 悬浮漂浮关键帧 */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }

        /* 3. 背景装饰旋转 */
        @keyframes slowSpin {
            from { transform: rotate(-2deg); }
            to { transform: rotate(2deg); }
        }

        /* 4. 文字流光效果 */
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* 应用动画的类 */
        .animate-fade-up {
            opacity: 0; /* 初始隐藏 */
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .animate-sway {
            animation: slowSpin 8s ease-in-out infinite alternate;
        }

        .text-shimmer {
            background: linear-gradient(90deg, #2563eb 0%, #60a5fa 50%, #2563eb 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }

        /* 延迟工具类 */
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }
        .delay-500 { animation-delay: 0.5s; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans leading-relaxed overflow-x-hidden">

    <div class="min-h-screen flex flex-col transition-opacity duration-500" id="landing-page">

                        <img alt="User Avatar" class="w-10 h-10 rounded-full border-2 border-white transition-transform hover:scale-110 hover:z-10 relative z-0" src="https://modao.cc/agent-py/media/generated_images/2026-02-05/dbefc2ab4fb849419f7f53052a1f11ca.jpg">

        <div class="flex-1 flex overflow-hidden">

            <main class="flex-1 bg-slate-100 overflow-auto flex justify-center p-12 hide-scrollbar relative" id="main-canvas-area">

                    <button class="p-2 hover:bg-slate-100 rounded-full transition-colors" onclick="zoomCanvas(-0.1)">
                        <span class="iconify text-xl" data-icon="solar:minus-circle-linear"></span>
                    </button>
                    <span class="text-sm font-semibold text-slate-600 w-12 text-center select-none" id="zoom-value">80%</span>
                    <button class="p-2 hover:bg-slate-100 rounded-full transition-colors" onclick="zoomCanvas(0.1)">
                        <span class="iconify text-xl" data-icon="solar:add-circle-linear"></span>
                    </button>
                    <div class="w-px h-4 bg-slate-300 mx-2"></div>

                    </button>
                </div>

                <div class="relative bg-white w-[794px] h-[1123px] canvas-shadow transition-transform duration-200 ease-out origin-top" id="canvas-container" style="transform: scale(0.8);">

                        <div class="canvas-element absolute left-10 top-10 pointer-events-auto group" onclick="selectElement(this)" style="left: 60px; top: 60px;">
                            <h1 class="text-4xl font-black text-slate-800 tracking-tight outline-none focus:bg-blue-50/50 rounded px-1" contenteditable="true">您的姓名</h1>
                            <p class="text-blue-600 font-medium text-lg outline-none focus:bg-blue-50/50 rounded px-1" contenteditable="true">求职意向：前端开发专家</p>

                    </div>
                </div>

            <aside class="w-72 bg-white border-l border-slate-200 p-6 flex flex-col gap-8 overflow-y-auto z-10 shadow-sm">
                <div>
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">属性编辑</h3>
                    
                    <div class="text-center py-10 transition-opacity" id="empty-state">
                        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4">
                            <span class="iconify text-3xl text-slate-300" data-icon="solar:magic-stick-3-linear"></span>
                        </div>
                        <p class="text-sm text-slate-400">选择画布中的元素<br>开始自定义设计</p>
                    </div>

                    <div class="hidden space-y-6 animate-fade-up" id="text-controls" style="animation-duration: 0.3s">
                        <div class="space-y-3">
                            <label class="text-xs font-bold text-slate-500 flex items-center gap-1">
                                <span class="iconify" data-icon="solar:text-field-linear"></span> 字体家族
                            </label>
                            <select class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all">
                                <option>思源黑体</option>
                                <option>思源宋体</option>
                                <option>PingFang SC</option>

                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-2">
                                <label class="text-xs font-bold text-slate-500">字号</label>
                                <div class="relative">
                                    <input class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm" onchange="updateAttr('fontSize', this.value + 'px')" type="number" value="16">
                                    <span class="absolute right-3 top-2 text-xs text-slate-400">px</span>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-bold text-slate-500">颜色</label>
                                <div class="flex gap-2 items-center h-[38px] bg-slate-50 border border-slate-200 rounded-lg px-2">
                                    <input class="w-6 h-6 rounded cursor-pointer border-none bg-transparent p-0" onchange="updateAttr('color', this.value)" type="color">
                                    <span class="text-xs text-slate-400">选色</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button class="flex-1 p-2 bg-slate-50 border border-slate-200 rounded hover:bg-white hover:shadow-sm hover:text-blue-600 transition-all"><span class="iconify mx-auto" data-icon="solar:text-bold-bold"></span></button>
                            <button class="flex-1 p-2 bg-slate-50 border border-slate-200 rounded hover:bg-white hover:shadow-sm hover:text-blue-600 transition-all"><span class="iconify mx-auto" data-icon="solar:text-italic-bold"></span></button>
                            <button class="flex-1 p-2 bg-slate-50 border border-slate-200 rounded hover:bg-white hover:shadow-sm hover:text-blue-600 transition-all"><span class="iconify mx-auto" data-icon="solar:text-underline-bold"></span></button>
                        </div>
                    </div>

                    <div class="hidden space-y-6 animate-fade-up" id="shape-controls" style="animation-duration: 0.3s">
                        <div class="space-y-3">
                            <label class="text-xs font-bold text-slate-500">填充颜色</label>
                            <div class="flex gap-2 items-center h-10 bg-slate-50 border border-slate-200 rounded-lg px-2">
                                <input class="w-full h-8 rounded cursor-pointer bg-transparent" onchange="updateAttr('backgroundColor', this.value)" type="color">
                            </div>
                        </div>
                        <div class="space-y-3">
                            <label class="text-xs font-bold text-slate-500 flex justify-between">
                                圆角 <span class="text-slate-400 font-normal">0px</span>
                            </label>
                            <input class="w-full accent-blue-600 h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer" oninput="updateAttr('borderRadius', this.value + 'px')" type="range">
                        </div>
                    </div>
                </div>

                <div class="mt-auto border-t border-slate-100 pt-6">
                    <button class="w-full flex items-center justify-center gap-2 py-3 border-2 border-red-50 text-red-400 hover:bg-red-50 hover:text-red-500 rounded-xl transition-all font-medium text-sm active:scale-95" onclick="deleteElement()">
                        <span class="iconify" data-icon="solar:trash-bin-trash-bold"></span>
                        删除选中元素
                    </button>
                </div>
            </aside>
        </div>
    </div>

    <script>
        let currentZoom = 0.8;
        let selectedElement = null;

        function showEditor() {
            const landing = document.getElementById('landing-page');
            const editor = document.getElementById('editor-page');
            
            landing.style.opacity = '0';
            setTimeout(() => {
                landing.classList.add('hidden');
                editor.classList.remove('hidden');
                // 强制重绘以触发 transition
                setTimeout(() => {
                    editor.style.opacity = '1';
                }, 50);
            }, 500);
        }

        function hideEditor() {
            const landing = document.getElementById('landing-page');
            const editor = document.getElementById('editor-page');

            editor.style.opacity = '0';
            setTimeout(() => {
                editor.classList.add('hidden');
                landing.classList.remove('hidden');
                setTimeout(() => {
                    landing.style.opacity = '1';
                }, 50);
            }, 300);
        }

        function zoomCanvas(delta) {
            currentZoom = Math.min(Math.max(0.3, currentZoom + delta), 1.5);
            document.getElementById('canvas-container').style.transform = `scale(${currentZoom})`;
            document.getElementById('zoom-value').innerText = Math.round(currentZoom * 100) + '%';
        }

        function selectElement(el) {
            if (selectedElement) selectedElement.classList.remove('active');
            selectedElement = el;
            selectedElement.classList.add('active');
            
            // 更新属性面板
            document.getElementById('empty-state').classList.add('hidden');
            const isText = el.hasAttribute('contenteditable') || el.querySelector('[contenteditable]');
            const isShape = el.dataset.type === 'shape';
            
            document.getElementById('text-controls').classList.toggle('hidden', !isText);
            document.getElementById('shape-controls').classList.toggle('hidden', !isShape);
        }

        function addText() {
            const div = document.createElement('div');
            div.className = 'canvas-element absolute p-2 min-w-[100px] text-slate-800';
            div.style.left = '100px';
            div.style.top = '200px';
            div.innerHTML = '<div contenteditable="true" class="outline-none">在这里输入新文字...</div>';
            div.onclick = (e) => {
                e.stopPropagation();
                selectElement(div);
            };
            makeDraggable(div);
            document.getElementById('canvas-elements-root').appendChild(div);
            selectElement(div);
        }

        function addShape() {
            const div = document.createElement('div');
            div.dataset.type = 'shape';
            div.className = 'canvas-element absolute w-32 h-32 bg-blue-500 rounded-lg';
            div.style.left = '150px';
            div.style.top = '300px';
            div.onclick = (e) => {
                e.stopPropagation();
                selectElement(div);
            };
            makeDraggable(div);
            document.getElementById('canvas-elements-root').appendChild(div);
            selectElement(div);
        }

        function triggerImageUpload() {
            document.getElementById('image-input').click();
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'canvas-element absolute w-48 shadow-lg rounded-md';
                    img.style.left = '100px';
                    img.style.top = '100px';
                    img.onclick = (ev) => {
                        ev.stopPropagation();
                        selectElement(img);
                    };
                    makeDraggable(img);
                    document.getElementById('canvas-elements-root').appendChild(img);
                    selectElement(img);
                };
                reader.readAsDataURL(file);
            }
        }

        function updateAttr(key, value) {
            if (!selectedElement) return;
            const target = selectedElement.querySelector('[contenteditable]') || selectedElement;
            target.style[key] = value;
        }

        function rotateElement(deg) {
            if (!selectedElement) return;
            const currentRotation = selectedElement.dataset.rotation ? parseInt(selectedElement.dataset.rotation) : 0;
            const newRotation = currentRotation + deg;
            selectedElement.dataset.rotation = newRotation;
            selectedElement.style.transform = `rotate(${newRotation}deg)`;
        }

        function deleteElement() {
            if (selectedElement) {
                selectedElement.remove();
                selectedElement = null;
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('text-controls').classList.add('hidden');
                document.getElementById('shape-controls').classList.add('hidden');
            }
        }

        function makeDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            el.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                if (e.target.hasAttribute('contenteditable')) return; 
                e = e || window.event;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                selectElement(el);
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        // 初始化默认引导元素的可拖动性
        document.querySelectorAll('.canvas-element').forEach(el => makeDraggable(el));
        
        // 点击画布空白处取消选中
        document.getElementById('main-canvas-area')?.addEventListener('click', function(e) {
            if(e.target.id === 'main-canvas-area') {
                if(selectedElement) selectedElement.classList.remove('active');
                selectedElement = null;
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('text-controls').classList.add('hidden');
                document.getElementById('shape-controls').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
